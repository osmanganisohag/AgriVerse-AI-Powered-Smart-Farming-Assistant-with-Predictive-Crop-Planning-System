<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgriVerse – AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e3f9e5, #d0f0c0, #a8e6cf);
            background-attachment: fixed;
            font-family: "Poppins", sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1140px;
            margin-top: 70px;
        }
        h2 {
            font-weight: 700;
            color: #2b7a0b;
        }
        .card {
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-align: left;
            padding: 35px 25px;
            background: #ffffffcc;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        textarea.form-control {
            border-radius: 10px;
            resize: none;
        }
        .btn-primary {
            background-color: #0078d7;
            border: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .result-box {
            background: #ffffffcc;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #cce3d3;
            min-height: 150px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            white-space: pre-wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .btn-back {
            margin-top: 30px;
            border-radius: 10px;
            font-weight: 500;
        }
        .row.equal-height {
            display: flex;
        }
        .row.equal-height > [class*='col-'] {
            display: flex;
            flex-direction: column;
        }
        .row.equal-height .result-box {
            flex-grow: 1;
        }
        footer {
            margin-top: 70px;
            text-align: center;
            color: #2e7d32;
            font-size: 0.9rem;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 class="text-center mb-4">
        🤖 AgriVerse – AI Assistant
    </h2>

    <form method="POST" class="card">
        <div class="mb-3">
            <label for="question" class="form-label">Ask a question:</label>
            <textarea name="question" id="question" class="form-control" rows="3" required>{{ question }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Ask AI</button>
    </form>

    {% if question %}
    <div class="mt-4">
        <h5 class="mt-4 text-center text-success">AI Model Comparison</h5>
        <div class="row mt-3 equal-height">
            <div class="col-md-6 mb-3 mb-md-0">
                <h6 class="text-secondary">Vanilla GPT-2</h6>
                <div class="result-box">{{ vanilla_output }}</div>
            </div>
            <div class="col-md-6">
                <h6 class="text-success">Fine-tuned GPT-2</h6>
                <div class="result-box">{{ finetuned_output }}</div>
            </div>
        </div>
    </div>

    <div class="text-center">
        <a href="/" class="btn btn-outline-secondary btn-back">⬅ Back to Home</a>
    </div>
    {% endif %}
</div>

<footer>
    © 2025 AgriVerse. All Rights Reserved.
</footer>
</body>
</html>
