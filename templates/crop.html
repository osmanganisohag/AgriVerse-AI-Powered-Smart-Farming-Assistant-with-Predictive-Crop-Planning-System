<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgriVerse – Crop Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e3f9e5, #d0f0c0, #a8e6cf);
            background-attachment: fixed;
            font-family: "Poppins", sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1140px;
            margin-top: 70px;
        }
        h2 {
            font-weight: 700;
            color: #2b7a0b;
        }
        .card {
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-align: left;
            padding: 35px 25px;
            background: #ffffffcc;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        .form-control {
            border-radius: 10px;
        }
        .btn-success {
            background-color: #4CAF50;
            border: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-back {
            margin-top: 30px;
            border-radius: 10px;
            font-weight: 500;
        }
        .alert {
            background: #ffffffcc;
            border-radius: 10px;
            border: 1px solid #cce3d3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        footer {
            margin-top: 70px;
            text-align: center;
            color: #2e7d32;
            font-size: 0.9rem;
            padding-bottom: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 class="text-center mb-4">
        🌾 AgriVerse – Crop Recommendation
    </h2>

    <form action="/crop" method="POST" class="card">
        <div class="row mb-3">
            <div class="col-md-4">
                <label>Nitrogen</label>
                <input type="number" class="form-control" name="Nitrogen" required>
            </div>
            <div class="col-md-4">
                <label>Phosphorus</label>
                <input type="number" class="form-control" name="Phosporus" required>
            </div>
            <div class="col-md-4">
                <label>Potassium</label>
                <input type="number" class="form-control" name="Potassium" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label>Temperature (°C)</label>
                <input type="number" class="form-control" step="any" name="Temperature" required>
            </div>
            <div class="col-md-4">
                <label>Humidity (%)</label>
                <input type="number" class="form-control" step="any" name="Humidity" required>
            </div>
            <div class="col-md-2">
                <label>pH</label>
                <input type="number" class="form-control" step="any" name="Ph" required>
            </div>
            <div class="col-md-2">
                <label>Rainfall (mm)</label>
                <input type="number" class="form-control" step="any" name="Rainfall" required>
            </div>
        </div>

        <button type="submit" class="btn btn-success w-100">🌱 Get Recommendation</button>
    </form>

    {% if result %}
    <div class="alert text-center mt-4">
        <h5>Recommended Crop: <b>{{ result }}</b></h5>
    </div>
    <div class="text-center">
        <a href="/" class="btn btn-outline-secondary btn-back">⬅ Back to Home</a>
    </div>
    {% endif %}
</div>

<footer>
    © 2025 AgriVerse. All Rights Reserved.
</footer>
</body>
</html>
